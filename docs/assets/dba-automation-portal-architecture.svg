<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">DBA Automation Portal Architecture</title>
  <desc id="desc">Architecture diagram showing laptop offline preparation, target VM /dbaportal mountpoint, Semaphore UI, local repositories, automation projects, Oracle targets, and evidence outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#93c5fd"/>
    </marker>
    <style>
      .title { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 800 17px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .small { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .muted { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .panel { fill: rgba(15, 23, 42, 0.92); stroke: rgba(148, 163, 184, 0.28); stroke-width: 1.4; }
      .chip { fill: rgba(15, 23, 42, 0.78); stroke: rgba(226, 232, 240, 0.22); stroke-width: 1; }
      .line { stroke: #93c5fd; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.9; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="110" cy="80" r="180" fill="#2563eb" opacity="0.16"/>
  <circle cx="1170" cy="120" r="210" fill="#7c3aed" opacity="0.15"/>
  <circle cx="620" cy="720" r="230" fill="#16a34a" opacity="0.12"/>

  <text x="60" y="62" class="title">DBA Automation Portal</text>
  <text x="60" y="92" class="subtitle">Offline-ready Semaphore UI control plane for Oracle install, replication, and patch automation</text>

  <g filter="url(#shadow)">
    <rect x="60" y="145" width="245" height="165" rx="14" class="panel"/>
    <rect x="82" y="168" width="66" height="66" rx="16" fill="url(#blue)"/>
    <text x="104" y="210" font-size="34" fill="#ffffff">💻</text>
    <text x="165" y="188" class="label">Laptop</text>
    <text x="165" y="213" class="small">Internet access</text>
    <text x="82" y="263" class="muted">prepare-offline-assets.ps1</text>
    <text x="82" y="284" class="muted">Semaphore binary + bundles</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="125" width="520" height="465" rx="18" class="panel"/>
    <text x="410" y="164" class="label">Target VM Mountpoint</text>
    <text x="410" y="190" class="small">/dbaportal</text>

    <rect x="415" y="220" width="205" height="92" rx="12" class="chip"/>
    <rect x="431" y="238" width="44" height="44" rx="11" fill="url(#purple)"/>
    <text x="441" y="268" font-size="24" fill="#ffffff">🧭</text>
    <text x="492" y="250" class="label">Semaphore UI</text>
    <text x="492" y="275" class="muted">web + scheduler</text>
    <text x="492" y="294" class="muted">SQLite + config</text>

    <rect x="660" y="220" width="205" height="92" rx="12" class="chip"/>
    <rect x="676" y="238" width="44" height="44" rx="11" fill="url(#green)"/>
    <text x="686" y="268" font-size="24" fill="#ffffff">📦</text>
    <text x="737" y="250" class="label">Local Git</text>
    <text x="737" y="275" class="muted">portal bare repo</text>
    <text x="737" y="294" class="muted">worktree snapshots</text>

    <rect x="415" y="345" width="450" height="120" rx="12" class="chip"/>
    <rect x="435" y="367" width="62" height="62" rx="14" fill="url(#red)"/>
    <text x="448" y="407" font-size="30" fill="#ffffff">🟥</text>
    <text x="520" y="374" class="label">Automation Projects</text>
    <text x="520" y="401" class="small">oracle-install-replication-framework</text>
    <text x="520" y="424" class="small">oracle-replication-framework</text>
    <text x="520" y="447" class="small">oracle-patch-framework</text>

    <rect x="415" y="500" width="205" height="55" rx="12" class="chip"/>
    <text x="435" y="533" class="small">🗄️ backups</text>
    <rect x="660" y="500" width="205" height="55" rx="12" class="chip"/>
    <text x="680" y="533" class="small">📊 exported reports</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="145" width="230" height="350" rx="16" class="panel"/>
    <text x="1020" y="184" class="label">Oracle Estate</text>
    <rect x="1020" y="220" width="170" height="58" rx="12" fill="url(#red)" opacity="0.9"/>
    <text x="1040" y="255" class="small" fill="#ffffff">Install GI / DB</text>
    <rect x="1020" y="305" width="170" height="58" rx="12" fill="url(#green)" opacity="0.9"/>
    <text x="1040" y="340" class="small" fill="#ffffff">Data Guard</text>
    <rect x="1020" y="390" width="170" height="58" rx="12" fill="url(#amber)" opacity="0.9"/>
    <text x="1040" y="425" class="small" fill="#ffffff">Patch Targets</text>
  </g>

  <path d="M305 228 C340 228 340 250 380 250" class="line"/>
  <path d="M900 285 C940 285 950 250 990 250" class="line"/>
  <path d="M900 392 C940 392 950 334 990 334" class="line"/>
  <path d="M900 452 C940 452 950 419 990 419" class="line"/>

  <g filter="url(#shadow)">
    <rect x="125" y="560" width="1030" height="82" rx="16" fill="rgba(15, 23, 42, 0.82)" stroke="rgba(125, 211, 252, 0.34)"/>
    <text x="155" y="594" class="label">Operational Flow</text>
    <text x="155" y="623" class="small">Prepare offline assets → Import bundles → Publish local portal repo → Bootstrap Semaphore → Run guided templates → Export evidence</text>
  </g>
</svg>
